      resource_provider: "AMD"
      resource_scale: medium
      allocation_details: "Access to AMD Instinct MI250X/MI300X GPU clusters for AI and HPC research."
      eligibility: "Faculty and researchers at accredited universities"
      deadline_type: rolling
      relevance: very_high
      access_url: "https://www.amd.com/en/corporate/university-program/ai-hpc-cluster.html"

    - name: ibm_academic_initiative
