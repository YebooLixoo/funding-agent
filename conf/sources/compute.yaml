      url: "https://www.primeintellect.ai/"
      resource_type: gpu
      resource_provider: "Prime Intellect"
      resource_scale: credits
      allocation_details: "Distributed GPU compute credits for collaborative AI research and open-source model training."
      eligibility: "Researchers and open-source AI contributors"
      deadline_type: rolling
      relevance: medium
      access_url: "https://www.primeintellect.ai/"

    - name: together_ai_research
