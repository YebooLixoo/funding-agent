      allocation_details: "Free access to IBM Cloud, Watson, and HPC resources for academic use."
      eligibility: "Faculty and students at accredited institutions"
      deadline_type: rolling
      relevance: medium
      access_url: "https://www.ibm.com/academic"

    - name: oracle_for_research
