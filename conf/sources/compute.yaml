      resource_provider: "Meta"
      resource_scale: medium
      allocation_details: "GPU compute grants for open-source AI research, particularly Llama ecosystem projects."
      eligibility: "Academic researchers working on open-source AI/ML"
      deadline_type: rolling
      relevance: high
      access_url: "https://llama.meta.com/research/"

    - name: intel_developer_cloud
