      resource_provider: "AWS"
      resource_scale: credits
      allocation_details: "AWS credits for research computing. Covers EC2 GPU instances (P4d, P5), SageMaker, and S3."
      eligibility: "Researchers at accredited institutions; requires research proposal"
      deadline_type: rolling
      relevance: very_high
      access_url: "https://aws.amazon.com/government-education/research-and-technical-computing/cloud-credit-for-research/"

    - name: microsoft_azure_research
      label: "Microsoft Azure for Research / AI for Good"
      url: "https://www.microsoft.com/en-us/research/academic-programs/"
      resource_type: cloud_credits
      resource_provider: "Microsoft Azure"
      resource_scale: credits
      allocation_details: "Azure credits for AI research. Access to A100/H100 VMs, Azure ML. AI for Good grants up to $25,000 credits."
      eligibility: "Faculty and researchers at accredited institutions; AI for Good open to nonprofits"
      deadline_type: rolling
      relevance: very_high
      access_url: "https://www.microsoft.com/en-us/research/academic-programs/"

    - name: amd_hpc_cluster
      label: "AMD University Program AI & HPC Cluster"
      url: "https://www.amd.com/en/corporate/university-program/ai-hpc-cluster.html"
