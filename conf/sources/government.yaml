government:
  nsf:
    enabled: true
    name: "NSF"
    rss_url: "https://www.nsf.gov/rss/rss_www_funding.xml"
    search_keywords:
      - "artificial intelligence"
      - "machine learning"
      - "transportation"
      - "autonomous"
      - "deep learning"

  grants_gov:
    enabled: true
    name: "Grants.gov"
    base_url: "https://api.simpler.grants.gov/v1/opportunities/search"
    # API key provided via GRANTS_GOV_API_KEY env var
    rate_limit_per_minute: 60
    search_keywords:
      - "artificial intelligence"
      - "machine learning"
      - "transportation"
      - "autonomous vehicles"
      - "deep learning"
      - "smart infrastructure"

  # Government web pages (scraped like industry but categorized as government)
  web_sources:
    - name: doe
      label: "DOE Funding Opportunities"
      url: "https://www.energy.gov/funding-financing"
      relevance: high

    - name: usdot
      label: "USDOT Grant Programs"
      url: "https://www.transportation.gov/grants"
      relevance: very_high
